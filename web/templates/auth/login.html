{% extends "layout.html" %}

{% block title %}Login{% endblock %}
{% block header_title %}Operator Authentication{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="auth-icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <h2>Operator Access</h2>
            <p class="auth-subtitle">Authenticate to manage CCAF firewall policies and monitoring.</p>
        </div>

        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Passphrase" required>

            <button type="submit" class="full-width">Authenticate</button>
        </form>

        <p class="auth-footer">
            New operator? <a href="/signup">Request Access</a>
        </p>
    </div>
</div>
{% endblock %}
