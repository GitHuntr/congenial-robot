{% extends "layout.html" %}

{% block title %}Sign Up{% endblock %}
{% block header_title %}Operator Onboarding{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="auth-icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
            </svg>
            <h2>Request Access</h2>
            <p class="auth-subtitle">Register an operator account for controlled access to CCAF.</p>
        </div>

        <form method="POST" action="/signup">
            <input type="text" name="fullname" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Passphrase" required>

            <button type="submit" class="full-width success">Submit Request</button>
        </form>

        <p class="auth-footer">
            Already authorized? <a href="/login">Login</a>
        </p>
    </div>
</div>
{% endblock %}
